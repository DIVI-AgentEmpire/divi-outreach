<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIVI OUTREACH | AI Industry Angles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 10px;
        }
        .industry-checkbox:checked + label {
            border-color: #6366f1;
            background-color: rgba(99, 102, 241, 0.1);
            color: #818cf8;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">
    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="mb-12 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-white mb-2">DIVI <span class="text-indigo-500">OUTREACH</span></h1>
                <p class="text-slate-400">Scale your cold outreach with hyper-personalized industry angles.</p>
            </div>
            <div class="text-xs text-slate-500 uppercase tracking-widest font-semibold">
                SECURE CLOUD VERSION
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Left Column: Inputs -->
            <div class="lg:col-span-5 space-y-6">
                <div class="glass-panel rounded-2xl p-6 space-y-8">
                    <!-- Core Offer -->
                    <div>
                        <label for="core-offer" class="block text-sm font-medium text-slate-300 mb-3">What is your core offer/service?</label>
                        <textarea id="core-offer" rows="6" 
                            class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all placeholder-slate-600"
                            placeholder="e.g., I build premium e-commerce websites that load in under 2 seconds."></textarea>
                    </div>

                    <!-- Target Industries -->
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-4">Target Industries</label>
                        <div class="grid grid-cols-2 gap-3" id="industry-grid">
                            <div class="relative">
                                <input type="checkbox" id="ind-gyms" value="Gyms" class="hidden industry-checkbox">
                                <label for="ind-gyms" class="flex items-center justify-center px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg cursor-pointer hover:border-slate-500 transition-all text-sm">
                                    Gyms
                                </label>
                            </div>
                            <div class="relative">
                                <input type="checkbox" id="ind-real-estate" value="Real Estate Agents" class="hidden industry-checkbox">
                                <label for="ind-real-estate" class="flex items-center justify-center px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg cursor-pointer hover:border-slate-500 transition-all text-sm">
                                    Real Estate Agents
                                </label>
                            </div>
                            <div class="relative">
                                <input type="checkbox" id="ind-startups" value="Software Startups" class="hidden industry-checkbox">
                                <label for="ind-startups" class="flex items-center justify-center px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg cursor-pointer hover:border-slate-500 transition-all text-sm">
                                    Software Startups
                                </label>
                            </div>
                            <div class="relative">
                                <input type="checkbox" id="ind-dentists" value="Dentists" class="hidden industry-checkbox">
                                <label for="ind-dentists" class="flex items-center justify-center px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg cursor-pointer hover:border-slate-500 transition-all text-sm">
                                    Dentists
                                </label>
                            </div>
                            <div class="relative">
                                <input type="checkbox" id="ind-cafes" value="Local Cafes" class="hidden industry-checkbox">
                                <label for="ind-cafes" class="flex items-center justify-center px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg cursor-pointer hover:border-slate-500 transition-all text-sm">
                                    Local Cafes
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Action Button -->
                    <button id="generate-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-5 rounded-xl shadow-lg shadow-indigo-900/20 transition-all active:scale-[0.98] flex items-center justify-center space-x-2">
                        <span>Generate Industry Angles</span>
                        <svg id="loading-spinner" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Right Column: Outputs -->
            <div class="lg:col-span-7">
                <div class="glass-panel rounded-2xl p-6 min-h-[500px] flex flex-col">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-lg font-semibold text-white">Generated Emails</h2>
                        <span id="status-badge" class="hidden px-2 py-1 bg-indigo-500/10 text-indigo-400 text-xs rounded-full border border-indigo-500/20">Processing...</span>
                    </div>
                    
                    <div id="output-container" class="space-y-4 flex-grow custom-scrollbar overflow-y-auto max-h-[700px]">
                        <!-- Empty State -->
                        <div id="empty-state" class="flex flex-col items-center justify-center h-full py-20 text-slate-500">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mb-4 opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
                            </svg>
                            <p>Select industries and click generate to see the magic.</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="mt-12 pt-8 border-t border-slate-900 text-center text-slate-600 text-sm">
            &copy; 2024 DIVI OUTREACH. Secure Backend Infrastructure.
        </footer>
    </div>

    <script>
        const generateBtn = document.getElementById('generate-btn');
        const loadingSpinner = document.getElementById('loading-spinner');
        const outputContainer = document.getElementById('output-container');
        const emptyState = document.getElementById('empty-state');
        const statusBadge = document.getElementById('status-badge');

        generateBtn.addEventListener('click', async () => {
            const coreOffer = document.getElementById('core-offer').value.trim();
            const selectedIndustries = Array.from(document.querySelectorAll('.industry-checkbox:checked')).map(cb => cb.value);

            // Validation
            if (!coreOffer) return alert('Please enter your core offer.');
            if (selectedIndustries.length === 0) return alert('Please select at least one industry.');

            // UI State
            generateBtn.disabled = true;
            loadingSpinner.classList.remove('hidden');
            emptyState.classList.add('hidden');
            statusBadge.classList.remove('hidden');
            outputContainer.innerHTML = ''; // Clear previous results

            for (const industry of selectedIndustries) {
                const cardId = `card-${industry.replace(/\s+/g, '-').toLowerCase()}`;
                createCard(industry, "Generating email...", cardId, true);
                
                try {
                    // Call our internal Vercel Serverless Function
                    const response = await fetch("/api/generate", {
                        method: 'POST',
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            coreOffer: coreOffer,
                            industry: industry
                        })
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || errorData.error || 'API request failed');
                    }

                    const data = await response.json();
                    const emailContent = data.choices[0].message.content.trim();
                    updateCard(cardId, emailContent);

                } catch (error) {
                    console.error(`Error for ${industry}:`, error);
                    updateCard(cardId, `Error: ${error.message}`, true);
                }
            }

            // Reset UI State
            generateBtn.disabled = false;
            loadingSpinner.classList.add('hidden');
            statusBadge.classList.add('hidden');
        });

        function createCard(industry, content, id, isLoading = false) {
            const card = document.createElement('div');
            card.id = id;
            card.className = "bg-slate-900/50 border border-slate-800 rounded-xl p-5 hover:border-slate-700 transition-all";
            
            card.innerHTML = `
                <div class="flex justify-between items-start mb-3">
                    <span class="text-xs font-bold uppercase tracking-widest text-indigo-400">${industry}</span>
                    <button onclick="copyToClipboard('${id}')" class="text-slate-500 hover:text-white transition-colors p-1" title="Copy to clipboard">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                        </svg>
                    </button>
                </div>
                <div class="email-body text-slate-300 text-sm leading-relaxed whitespace-pre-wrap ${isLoading ? 'animate-pulse italic text-slate-500' : ''}">
                    ${content}
                </div>
            `;
            outputContainer.appendChild(card);
            outputContainer.scrollTop = outputContainer.scrollHeight;
        }

        function updateCard(id, content, isError = false) {
            const card = document.getElementById(id);
            if (!card) return;
            const body = card.querySelector('.email-body');
            body.classList.remove('animate-pulse', 'italic', 'text-slate-500');
            if (isError) body.classList.add('text-red-400');
            body.textContent = content;
        }

        window.copyToClipboard = (id) => {
            const card = document.getElementById(id);
            const text = card.querySelector('.email-body').textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = card.querySelector('button');
                const originalHTML = btn.innerHTML;
                btn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                `;
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                }, 2000);
            });
        };
    </script>
</body>
</html>
